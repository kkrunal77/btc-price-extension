<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Market Dashboard</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="dashboard-wrapper">
    <div class="glow"></div>
    <div class="dashboard-header">
      <div class="title-group">
        <span class="title-icon">📊</span>
        <h1>Markets Overview</h1>
      </div>
      <button class="refresh-btn" id="refresh-all" aria-label="Refresh All">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.92-12.28l5.67-5.67"/>
        </svg>
      </button>
    </div>

    <div class="grid-container" id="dashboard-grid">
      <!-- Market cards injected by popup.js -->
    </div>
    
    <div class="footer">
      <div class="last-updated">Last Sync: <span id="sync-time">--:--:--</span></div>
    </div>
  </div>

  <!-- TradingView Lightweight Charts Library locally -->
  <script src="lightweight-charts.js"></script>
  <script src="popup.js"></script>
</body>
</html>
